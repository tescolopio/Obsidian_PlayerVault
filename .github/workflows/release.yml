name: Release

# Trigger on any tag that looks like a version number (e.g. 1.0.0, 1.2.3-beta)
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build plugin
        run: npm run build

      # Verify that manifest.json version matches the pushed tag so releases
      # stay in sync with the version declared in the plugin.
      - name: Verify version matches manifest
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::manifest.json version ($MANIFEST_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Use the tag name as the release title; add a short description.
          name: "Player Vault ${{ github.ref_name }}"
          # Automatically generate release notes from commits since last tag.
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            styles.css
